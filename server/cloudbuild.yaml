steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'server'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/trail-pgh-server', '.']

  # 2. Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'server'
    args: ['push', 'gcr.io/$PROJECT_ID/trail-pgh-server']

  # 3. Deploy migration job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'trail-pgh-db-migrate'
      - '--image'
      - 'gcr.io/$PROJECT_ID/trail-pgh-server'
      - '--command'
      - 'npx'
      - '--args'
      - 'prisma,migrate,deploy'
      - '--region'
      - 'us-central1'
      - '--set-cloudsql-instances'
      - 'trail-pgh-issue-tracker:us-central1:trail-pgh-prod'
      - '--set-secrets'
      - 'DATABASE_URL=database_url:latest'

  # 4. Run migration
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'trail-pgh-db-migrate'
      - '--region'
      - 'us-central1'
      - '--wait'

  # 5. Deploy app
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trail-pgh-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/trail-pgh-server'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-cloudsql-instances'
      - 'trail-pgh-issue-tracker:us-central1:trail-pgh-prod'
      - '--set-secrets'
      - 'DATABASE_URL=database_url:latest,TRAIL_ISSUE_IMAGE_BUCKET=issue_image_bucket_name:latest,CLIENT_URL=client_url:latest,GOOGLE_CLIENT_ID=google_client_id:latest'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/trail-pgh-server'